<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>worlo Teams</title>
  <link rel="icon" href="favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png"/>
  <style>
    html, body.teams-app {
      background: linear-gradient(180deg, #5eb3e8 0%, #87ceeb 42%, #e8f4fc 100%);
      min-height: 100%;
      margin: 0;
    }
  </style>
  <script>
  if (location.protocol !== 'file:') {
    var b = document.createElement('base');
    b.href = location.pathname.indexOf('/teams-app') === 0
      ? '/teams-app/'
      : location.pathname.replace(/[^/]+$/, '');
    document.head.appendChild(b);
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="teams-paths.js"></script>
  <script src="teams-head.js"></script>
</head>
<body class="fx-tines fx-sky teams-app">

<div class="fx-sky-scene" aria-hidden="true">
  <div class="fx-sky-gradient"></div>
  <div class="fx-sky-stars" aria-hidden="true"></div>
</div>

<div id="view-auth" class="teams-view">
  <div class="teams-auth-card">
    <a href="/teams-app/index.html" class="teams-logo" id="link-home">worlo Teams</a>
    <p class="teams-auth-lead">Enter your invite code from the worlo dashboard. Use in browser or <a href="/teams-app/download.html" id="link-download">download the Windows app</a>.</p>
    <div class="form-group">
      <label class="form-label">First name</label>
      <input class="form-input" type="text" id="first-name" autocomplete="given-name"/>
    </div>
    <div class="form-group">
      <label class="form-label">Last name</label>
      <input class="form-input" type="text" id="last-name" autocomplete="family-name"/>
    </div>
    <div class="form-group">
      <label class="form-label">Nickname <span class="form-optional">(optional)</span></label>
      <input class="form-input" type="text" id="nickname" placeholder="How your team sees you" autocomplete="nickname"/>
    </div>
    <div class="form-group">
      <label class="form-label">Invite code</label>
      <input class="form-input" type="text" id="invite-code" placeholder="WORLO-XXXX-XXXX-XXXX" autocomplete="one-time-code"/>
    </div>
    <button type="button" class="btn btn-primary" id="btn-join" style="width:100%;margin-top:8px">Join team</button>
    <button type="button" class="btn btn-secondary" id="btn-auth-cancel" style="width:100%;margin-top:8px;display:none">Back to teams</button>
    <p id="auth-message" class="teams-auth-message hidden" role="alert" aria-live="polite"></p>
    <p class="teams-auth-foot">Need a code? Ask your admin in the <a href="/dashboard.html#teams" id="link-dashboard">worlo dashboard</a>.</p>
  </div>
</div>

<div id="view-chat" class="teams-view hidden">
  <header class="teams-header">
    <div class="teams-header-left">
      <span class="teams-logo-sm">worlo Teams</span>
      <select id="team-switcher-mobile" class="teams-switcher-mobile" aria-label="Switch team" hidden></select>
      <span class="teams-user-chip" id="user-label">Team member</span>
    </div>
    <nav class="teams-tabs" role="tablist">
      <button type="button" class="teams-tab active" data-tab="team" role="tab" aria-selected="true">Team chat</button>
      <button type="button" class="teams-tab" data-tab="ai" role="tab" aria-selected="false">AI assistant</button>
    </nav>
    <button type="button" class="teams-join-another-mobile" id="btn-join-another-mobile" hidden>+ Team</button>
    <button type="button" class="btn-signout" id="btn-leave" title="Leave the current team">Leave team</button>
  </header>

  <div class="teams-main">
    <aside class="teams-sidebar" id="team-sidebar">
      <div class="teams-sidebar-title">Your teams</div>
      <div class="teams-switcher-list" id="team-switcher-list" role="listbox" aria-label="Switch team"></div>
      <button type="button" class="teams-join-another" id="btn-join-another">+ Join another team</button>
      <div class="teams-sidebar-divider" aria-hidden="true"></div>
      <div class="teams-sidebar-title">Team members</div>
      <ul class="teams-member-list" id="member-list"></ul>
    </aside>

    <div class="teams-panels">
      <section id="panel-team" class="teams-panel active" role="tabpanel">
        <main class="teams-chat" id="team-chat-log" aria-live="polite"></main>
        <footer class="teams-compose">
          <div class="teams-compose-row">
            <textarea id="team-chat-input" rows="1" placeholder="Message your team…"></textarea>
            <button type="button" class="teams-ai-btn" id="btn-team-ai" title="Ask the AI in this chat">@ai</button>
            <button type="button" class="btn btn-primary teams-send-btn" id="btn-team-send">Send</button>
          </div>
        </footer>
      </section>

      <section id="panel-ai" class="teams-panel" role="tabpanel" hidden>
        <div class="teams-ai-banner"><span class="teams-ai-dot" aria-hidden="true"></span><span id="agent-label">Your AI assistant</span><span class="teams-ai-private">private</span></div>
        <main class="teams-chat" id="ai-chat-log" aria-live="polite"></main>
        <footer class="teams-compose">
          <div class="teams-compose-row">
            <textarea id="ai-chat-input" rows="1" placeholder="Ask your AI assistant…"></textarea>
            <button type="button" class="btn btn-primary teams-send-btn" id="btn-ai-send">Send</button>
          </div>
        </footer>
      </section>
    </div>
  </div>
</div>

<script>
(function () {
  var p = window.WORLO_TEAMS_PATHS;
  if (p) {
    [
      ['link-home', p.nav.home],
      ['link-download', p.nav.download],
      ['link-dashboard', p.nav.dashboard],
    ].forEach(function (pair) {
      var el = document.getElementById(pair[0]);
      if (el) el.href = pair[1];
    });
  }
  function loadScript(src, next) {
    var s = document.createElement('script');
    s.src = src;
    s.onload = next;
    s.onerror = next;
    document.body.appendChild(s);
  }
  var cfgSrc = (p && p.js.config) || '/worlo-config.js';
  var appSrc = (p && p.js.app) || '/teams-app/app.js';
  loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js', function () {
    loadScript(cfgSrc, function () {
      loadScript(appSrc);
    });
  });
})();
</script>
</body>
</html>
