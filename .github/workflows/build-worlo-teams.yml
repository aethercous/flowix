name: Build worlo Teams installers

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'worlo-teams-desktop/**'
      - 'teams-app/**'
      - 'worlo-tines.css'
      - 'worlo-landing.css'
      - 'worlo-sky.css'
      - 'worlo-config.js'
      - 'supabase/functions/teams-auth/**'
      - 'supabase/functions/team-chat/**'
      - 'supabase/functions/team-members/**'
      - 'supabase/functions/manage-teams-code/**'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install desktop dependencies
        run: npm ci --prefix worlo-teams-desktop
      - name: Build Windows .exe installer
        run: npm run build:win --prefix worlo-teams-desktop
      - name: Build portable Windows zip
        run: powershell -ExecutionPolicy Bypass -File scripts/build-teams-portable.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: worlo-teams-windows
          path: |
            downloads/worlo-teams-setup.exe
            downloads/worlo-teams-portable.exe
            downloads/worlo-teams-win.zip
            worlo-teams-desktop/dist/*.exe
      - name: Publish installer to GitHub Releases
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: worlo-teams-latest
          name: worlo Teams (latest)
          body: |
            Auto-built worlo Teams Windows downloads.
            - **worlo-teams-portable.exe** — double-click to run (no install, no unzip)
            - **worlo-teams-setup.exe** — full installer (launches when install finishes)
            - **worlo-teams-win.zip** / **worlo-teams-mac.zip** — portable folders
          files: |
            downloads/worlo-teams-setup.exe
            downloads/worlo-teams-portable.exe
            downloads/worlo-teams-win.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install desktop dependencies
        run: npm ci --prefix worlo-teams-desktop
      - name: Build native macOS app (Dock icon)
        run: npm run build:mac --prefix worlo-teams-desktop
      - name: Build lightweight Mac zip for site
        run: bash scripts/build-teams-mac-app.sh --lightweight
      - uses: actions/upload-artifact@v4
        with:
          name: worlo-teams-mac
          path: |
            worlo-teams-desktop/dist/worlo-teams-mac.zip
            downloads/worlo-teams-mac.zip
      - name: Publish Mac zip to GitHub Releases
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: worlo-teams-latest
          files: worlo-teams-desktop/dist/worlo-teams-mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
